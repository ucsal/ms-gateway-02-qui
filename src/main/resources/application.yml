server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # ==========================================
        # 1. ROTAS 100% PÚBLICAS (Sem a linha do filtro)
        # ==========================================
        # Liberaçăo dos endpoints do Swagger (agora buscando pelo Eureka via lb://)
        - id: swagger-docs-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/v3/api-docs

        - id: swagger-docs-professor
          uri: lb://ms-professor
          predicates:
            - Path=/api/professores/v3/api-docs

        - id: swagger-docs-escolas
          uri: lb://escola-service
          predicates:
            - Path=/api/escolas/v3/api-docs, /api/ies/v3/api-docs

        - id: swagger-docs-espacos
          uri: lb://microservico_espaco
          predicates:
            - Path=/espacos/v3/api-docs

        - id: swagger-docs-softwares
          uri: lb://microservico_software
          predicates:
            - Path=/softwares/v3/api-docs

        - id: swagger-docs-solicitacoes
          uri: lb://ms-solicitacoes
          predicates:
            - Path=/api/solicitacoes/v3/api-docs

        # Liberaçăo do endpoint de Login público
        - id: ms-auth-login
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/login

        # Liberaçăo do endpoint de Cadastro de Professor público
        - id: ms-professor-cadastro
          uri: lb://ms-professor
          predicates:
            - Path=/api/professores
            - Method=POST

        # ==========================================
        # 2. ROTAS PROTEGIDAS (Exigem Token JWT)
        # ==========================================
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthenticationFilter

        - id: ms-professor
          uri: lb://ms-professor
          predicates:
            - Path=/api/professores/**
          filters:
            - AuthenticationFilter

        - id: escola-service
          uri: lb://escola-service
          predicates:
            - Path=/api/escolas/**, /api/ies/**
          filters:
            - AuthenticationFilter

        - id: microservico_espaco
          uri: lb://microservico_espaco
          predicates:
            - Path=/espacos/**
          filters:
            - AuthenticationFilter

        - id: microservico_software
          uri: lb://microservico_software
          predicates:
            - Path=/softwares/**
          filters:
            - AuthenticationFilter

        - id: ms-solicitacoes
          uri: lb://ms-solicitacoes
          predicates:
            - Path=/api/solicitacoes/**
          filters:
            - AuthenticationFilter

# ==========================================
# 3. CONFIGURAÇĂO DO EUREKA CLIENT
# ==========================================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Chave JWT
api:
  security:
    token:
      secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

